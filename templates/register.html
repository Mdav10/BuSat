<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - BuSat</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:#0a0e17;color:#fff;min-height:100vh;display:flex;justify-content:center;align-items:center;background:radial-gradient(ellipse at center,#0d1a2d 0%,#0a0e17 100%)}
        .container{background:rgba(255,255,255,0.03);padding:3rem;border-radius:24px;border:1px solid rgba(255,255,255,0.06);max-width:460px;width:100%;backdrop-filter:blur(10px)}
        .logo{font-size:2rem;font-weight:800;background:linear-gradient(135deg,#00d4ff,#0066ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-align:center;margin-bottom:0.3rem}
        .subtitle{text-align:center;color:rgba(255,255,255,0.4);font-size:0.95rem;margin-bottom:2rem}
        .form-group{margin-bottom:1.2rem}
        .form-group label{display:block;margin-bottom:0.4rem;color:rgba(255,255,255,0.7);font-weight:500;font-size:0.9rem}
        .form-group input{width:100%;padding:0.9rem 1.2rem;border-radius:12px;border:2px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.05);color:#fff;font-size:1rem;transition:all 0.3s}
        .form-group input:focus{outline:none;border-color:#00d4ff;box-shadow:0 0 30px rgba(0,100,255,0.1)}
        .form-group input::placeholder{color:rgba(255,255,255,0.3)}
        .btn{width:100%;padding:1rem;border:none;border-radius:12px;background:linear-gradient(135deg,#00d4ff,#0066ff);color:#fff;font-size:1.1rem;font-weight:600;cursor:pointer;transition:all 0.3s}
        .btn:hover{transform:translateY(-2px);box-shadow:0 10px 40px rgba(0,100,255,0.3)}
        .link{text-align:center;margin-top:1.5rem;color:rgba(255,255,255,0.5)}
        .link a{color:#00d4ff;text-decoration:none;font-weight:600}
        .link a:hover{text-decoration:underline}
        .flash{padding:0.8rem 1.2rem;border-radius:10px;margin-bottom:1.2rem;font-size:0.95rem}
        .flash-success{background:rgba(0,255,100,0.08);border:1px solid rgba(0,255,100,0.15);color:#00ff64}
        .flash-danger{background:rgba(255,0,50,0.08);border:1px solid rgba(255,0,50,0.15);color:#ff0032}
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">📱 BuSat</div>
        <div class="subtitle">Create your account</div>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="flash flash-{{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        
        <form method="POST">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" placeholder="Choose a username" required>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="Enter your email" required>
            </div>
            <div class="form-group">
                <label>Full Name (optional)</label>
                <input type="text" name="full_name" placeholder="Your full name">
            </div>
            <div class="form-group">
                <label>Phone Number (optional)</label>
                <input type="tel" name="phone" placeholder="+1234567890">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Min 6 characters" required>
            </div>
            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" name="confirm" placeholder="Confirm your password" required>
            </div>
            <button type="submit" class="btn">Create Account</button>
        </form>
        
        <div class="link">
            Already have an account? <a href="/login">Sign in</a>
        </div>
    </div>
</body>
</html>
