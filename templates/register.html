<!DOCTYPE html>
<html>
<head><title>Register - BuSat</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial;background:#0a0e17;color:#fff;display:flex;justify-content:center;align-items:center;min-height:100vh}
.container{background:rgba(255,255,255,0.03);padding:3rem;border-radius:20px;border:1px solid rgba(255,255,255,0.05);max-width:400px;width:100%}
h1{text-align:center;color:#00d4ff;margin-bottom:2rem}
input{width:100%;padding:0.8rem;border-radius:10px;border:2px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.05);color:#fff;margin-bottom:1rem}
input:focus{outline:none;border-color:#00d4ff}
.btn{width:100%;padding:1rem;border:none;border-radius:10px;background:#00d4ff;color:#0a0e17;font-weight:bold;cursor:pointer}
.flash{padding:0.8rem;border-radius:10px;margin-bottom:1rem}
.flash-success{background:rgba(0,255,100,0.1);border:1px solid rgba(0,255,100,0.2);color:#00ff64}
.flash-danger{background:rgba(255,0,50,0.1);border:1px solid rgba(255,0,50,0.2);color:#ff0032}
a{color:#00d4ff}
</style>
</head>
<body>
<div class="container">
<h1>📱 Register</h1>
{% with messages = get_flashed_messages(with_categories=true) %}
{% if messages %}{% for c,m in messages %}<div class="flash flash-{{ c }}">{{ m }}</div>{% endfor %}{% endif %}
{% endwith %}
<form method="POST">
<input type="text" name="username" placeholder="Username" required>
<input type="email" name="email" placeholder="Email" required>
<input type="password" name="password" placeholder="Password (min 6)" required>
<input type="password" name="confirm" placeholder="Confirm Password" required>
<button type="submit" class="btn">Register</button>
</form>
<p style="margin-top:1rem;color:rgba(255,255,255,0.6)">Have account? <a href="/login">Login</a></p>
</div>
</body>
</html>
