<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - BuSat</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Segoe UI',sans-serif;background:#0a0e17;color:#fff;min-height:100vh;display:flex;justify-content:center;align-items:center;background:radial-gradient(ellipse at center,#0d1a2d 0%,#0a0e17 100%)}
        .container{background:rgba(255,255,255,0.03);padding:3rem;border-radius:24px;border:1px solid rgba(255,255,255,0.06);max-width:420px;width:100%;backdrop-filter:blur(10px)}
        .container h1{text-align:center;font-size:2rem;margin-bottom:0.3rem;background:linear-gradient(135deg,#00d4ff,#0066ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .container .subtitle{text-align:center;color:rgba(255,255,255,0.5);margin-bottom:2rem;font-size:0.95rem}
        .form-group{margin-bottom:1.5rem}
        .form-group label{display:block;margin-bottom:0.5rem;color:rgba(255,255,255,0.7);font-weight:500;font-size:0.9rem}
        .form-group input{width:100%;padding:0.9rem 1.2rem;border-radius:12px;border:2px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.05);color:#fff;font-size:1rem;transition:all 0.3s}
        .form-group input:focus{outline:none;border-color:#00d4ff;box-shadow:0 0 30px rgba(0,100,255,0.1)}
        .form-group input::placeholder{color:rgba(255,255,255,0.3)}
        .btn{width:100%;padding:1rem;border:none;border-radius:12px;background:linear-gradient(135deg,#00d4ff,#0066ff);color:#fff;font-size:1.1rem;font-weight:600;cursor:pointer;transition:all 0.3s}
        .btn:hover{transform:translateY(-2px);box-shadow:0 10px 40px rgba(0,100,255,0.3)}
        .link{text-align:center;margin-top:1.5rem;color:rgba(255,255,255,0.5)}
        .link a{color:#00d4ff;text-decoration:none;font-weight:600}
        .link a:hover{text-decoration:underline}
        .flash{padding:0.8rem 1.2rem;border-radius:10px;margin-bottom:1.2rem;font-size:0.95rem}
        .flash-success{background:rgba(0,255,100,0.08);border:1px solid rgba(0,255,100,0.15);color:#00ff64}
        .flash-danger{background:rgba(255,0,50,0.08);border:1px solid rgba(255,0,50,0.15);color:#ff0032}
        .flash-info{background:rgba(0,212,255,0.08);border:1px solid rgba(0,212,255,0.15);color:#00d4ff}
    </style>
</head>
<body>
    <div class="container">
        <h1>🛰️ BuSat</h1>
        <div class="subtitle">Sign in to your account</div>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="flash flash-{{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        
        <form method="POST">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" placeholder="Enter your username" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="btn">Sign In</button>
        </form>
        
        <div class="link">
            Don't have an account? <a href="/register">Register here</a>
        </div>
    </div>
</body>
</html>
