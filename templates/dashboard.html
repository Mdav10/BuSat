<!DOCTYPE html>
<html>
<head><title>Dashboard - BuSat</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial;background:#0a0e17;color:#fff}
.navbar{background:rgba(10,14,23,0.95);padding:1rem 2rem;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(255,255,255,0.1)}
.logo{font-size:1.5rem;font-weight:bold;color:#00d4ff}
.container{padding:2rem;max-width:900px;margin:0 auto;text-align:center}
.box{background:rgba(255,255,255,0.03);padding:3rem;border-radius:20px;border:1px solid rgba(255,255,255,0.05);margin-top:2rem}
.box .icon{font-size:4rem;display:block;margin-bottom:1rem}
.box h2{color:#00d4ff;margin-bottom:1rem}
.box p{color:rgba(255,255,255,0.6);margin-bottom:2rem}
.btn{display:inline-block;padding:1rem 3rem;border-radius:50px;text-decoration:none;font-weight:bold;background:#00d4ff;color:#0a0e17}
.btn:hover{background:#0066ff}
.btn-logout{background:rgba(255,0,50,0.2);color:#ff0032;padding:0.5rem 1rem;border:none;border-radius:5px;cursor:pointer}
a{color:#00d4ff;text-decoration:none}
</style>
</head>
<body>
<nav class="navbar">
<div class="logo">📱 BuSat</div>
<div>
<span>👤 {{ user.username }}</span>
{% if user.is_admin %}<a href="/admin" style="margin:0 1rem;">Admin</a>{% endif %}
<a href="/logout" class="btn-logout">Logout</a>
</div>
</nav>
<div class="container">
<div class="box">
<span class="icon">📱</span>
<h2>Phone Tracking</h2>
<p>Track any phone number in real-time. Get location, carrier, and more.</p>
<a href="/phone-track" class="btn">Start Tracking</a>
</div>
</div>
</body>
</html>
